name: Update Ruby (v3) authlete_ruby_sdk

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false
          working-directory: ruby

      - name: Install build dependencies
        run: sudo apt-get install -y --no-install-recommends build-essential

      - name: Update authlete_ruby_sdk
        working-directory: ruby
        run: bundle update authlete_ruby_sdk

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract new version
        if: steps.changes.outputs.changed == 'true'
        id: version
        working-directory: ruby
        run: |
          VERSION=$(bundle exec ruby -e "require 'bundler'; puts Bundler.locked_gems.specs.find { |s| s.name == 'authlete_ruby_sdk' }.version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(ruby): update authlete_ruby_sdk to v${{ steps.version.outputs.version }}"
          title: "chore(ruby): update authlete_ruby_sdk to v${{ steps.version.outputs.version }}"
          body: |
            This PR updates `authlete_ruby_sdk` in `ruby/Gemfile.lock` to the latest available version.

            - Package: [authlete_ruby_sdk](https://rubygems.org/gems/authlete_ruby_sdk)
            - New version: `${{ steps.version.outputs.version }}`
          branch: "chore/ruby-update-authlete-ruby-sdk"
          delete-branch: true
          add-paths: |
            ruby/Gemfile
            ruby/Gemfile.lock
