name: Tag ruby on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(ruby -e "
            require 'bundler'
            spec = Bundler::LockfileParser.new(File.read('ruby/Gemfile.lock')).specs.find { |s| s.name == 'authlete_ruby_sdk' }
            puts spec.version
          ")
          echo "TAG_NAME=ruby-authlete-ruby-sdk-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          TAG="${{ steps.tag.outputs.TAG_NAME }}"
          git tag -f "$TAG"
          git push --force origin "refs/tags/$TAG"
