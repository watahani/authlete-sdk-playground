name: Tag ruby on merge

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "ruby/Gemfile.lock"

permissions: {}

jobs:
  tag:
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(ruby -e "
            require 'bundler'
            spec = Bundler::LockfileParser.new(File.read('ruby/Gemfile.lock')).specs.find { |s| s.name == 'authlete_ruby_sdk' }
            puts spec.version
          ")
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.pre\.[a-zA-Z0-9]+)?$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "TAG_NAME=ruby-authlete-ruby-sdk-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.tag.outputs.TAG_NAME }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi
          git tag "$TAG"
          git push origin "refs/tags/$TAG"
