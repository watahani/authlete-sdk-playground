name: Update PHP authlete/authlete

on:
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Get latest stable version from Packagist
        id: latest
        run: |
          VERSION=$(python3 - <<'PY'
          import json
          import re
          import urllib.request

          url = "https://repo.packagist.org/p2/authlete/authlete.json"
          with urllib.request.urlopen(url) as r:
              data = json.load(r)

          stable = []
          for pkg in data["packages"]["authlete/authlete"]:
              v = pkg["version"]
              # Keep plain stable releases like 1.14.0 (optionally with a leading "v").
              m = re.fullmatch(r"v?([0-9]+\.[0-9]+\.[0-9]+)", v)
              if m:
                  stable.append(m.group(1))

          if not stable:
              raise SystemExit("No stable version found on Packagist")

          latest = max(stable, key=lambda s: tuple(int(p) for p in s.split(".")))
          print(latest)
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute desired caret constraint
        id: desired
        env:
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          MAJOR_MINOR=$(echo "$LATEST" | cut -d. -f1,2)
          echo "constraint=^${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"

      - name: Get current constraint
        id: current
        run: |
          CONSTRAINT=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("php/composer.json").read_text(encoding="utf-8"))
          print(data["require"]["authlete/authlete"])
          PY
          )
          echo "constraint=${CONSTRAINT}" >> "$GITHUB_OUTPUT"

      - name: Update composer.json
        if: steps.desired.outputs.constraint != steps.current.outputs.constraint
        env:
          NEW_CONSTRAINT: ${{ steps.desired.outputs.constraint }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          new_constraint = os.environ["NEW_CONSTRAINT"]
          path = Path("php/composer.json")
          content = path.read_text(encoding="utf-8")
          # Replace only the authlete/authlete constraint, preserving JSON formatting.
          content = re.sub(
              r'("authlete/authlete"\s*:\s*)"[^"]+"',
              rf'\g<1>"{new_constraint}"',
              content,
          )
          path.write_text(content, encoding="utf-8")
          PY

      - name: Create pull request
        if: steps.desired.outputs.constraint != steps.current.outputs.constraint
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          commit-message: "chore(php): update authlete/authlete to ${{ steps.desired.outputs.constraint }}"
          title: "chore(php): update authlete/authlete to ${{ steps.desired.outputs.constraint }}"
          body: |
            This PR updates `authlete/authlete` in `php/composer.json` to track the latest release from Packagist.

            - Package: [authlete/authlete](https://packagist.org/packages/authlete/authlete)
            - Latest release: `${{ steps.latest.outputs.version }}`
            - Previous constraint: `${{ steps.current.outputs.constraint }}`
            - New constraint: `${{ steps.desired.outputs.constraint }}`
          branch: "chore/php-update-authlete"
          delete-branch: true
          add-paths: |
            php/composer.json
